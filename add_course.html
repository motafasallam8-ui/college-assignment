<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="add_course.css">
    <link rel="stylesheet" href="home.css">
</head>

<body>

<header class="navbar">
    <h2>CourseOrganizer</h2>

    <ul class="links">
        <li><a href="home.html">Home</a></li>
        <li><a href="my_course.html">My Courses</a></li>
        <li><a href="add_course.html">Add Course</a></li>
        <li><a href="contact_us.html">Contact Us</a></li>
    </ul>
</header>

<section class="header">
    <h1>Add New Course</h1>
    <p>Fill in the course information below.</p>
</section>

<section class="form-container">

    <form>

        <label>Course Name</label>
        <input type="text" placeholder="Enter course name">

        <label>Course Code</label>
        <input type="text" placeholder="Example: IT111">

        <label>Instructor Name</label>
        <input type="text" placeholder="Enter instructor name">

        <label>Credit Hours</label>
        <input type="number" placeholder="Enter credit hours">

        <label>Course Status</label>
        <select>
            <option>Planned</option>
            <option>In Progress</option>
            <option>Completed</option>
        </select>

        <label>Notes</label>
        <textarea placeholder="Write any notes about the course"></textarea>

        <button type="submit">Submit Course</button>

    </form>

</section>
<footer class="footer">
    <p>© 2026 Course Organizer. All rights reserved.</p>
    <p>Designed by Mostafa</p>
</footer>

</body>
</html>
